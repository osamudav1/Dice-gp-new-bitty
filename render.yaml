services:
  - type: web
    name: dice-game-bot
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: GAME_GROUP_ID
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: dice-game-db
          property: connectionString

databases:
  - name: dice-game-db
    plan: free
