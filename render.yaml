services:
  - type: web
    name: dice-game-bot
    runtime: python
    buildCommand: pip install -r requirements.txt && pip uninstall -y telegram || true
    startCommand: python bot.py
    healthCheckPath: /
    envVars:
      - key: BOT_TOKEN
        sync: false
      - key: OWNER_ID
        sync: false
      - key: GAME_GROUP_ID
        sync: false
      - key: MONGODB_URL
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: dice-game-db
          property: connectionString
      - key: PORT
        value: "8080"

databases:
  - name: dice-game-db
    plan: free
